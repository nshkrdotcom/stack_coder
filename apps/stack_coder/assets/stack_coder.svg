<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Hexagon Clip Path to ensure transparency outside -->
    <clipPath id="hex-clip">
      <polygon points="100,5 182.27,52.5 182.27,147.5 100,195 17.73,147.5 17.73,52.5" />
    </clipPath>

    <!-- Gradients -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c1a4d" />
      <stop offset="50%" stop-color="#4e2a84" />
      <stop offset="100%" stop-color="#1a0f2e" />
    </linearGradient>

    <linearGradient id="elixir-drop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d86e9" />
      <stop offset="100%" stop-color="#694bb8" />
    </linearGradient>
    
    <!-- Pattern for Stack Code lines -->
    <pattern id="code-lines" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <line x1="0" y1="10" x2="20" y2="10" stroke="#8b72d8" stroke-width="1" stroke-dasharray="2,2" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Group with Hexagon Clip -->
  <g clip-path="url(#hex-clip)">
    <!-- Base Background -->
    <polygon points="100,5 182.27,52.5 182.27,147.5 100,195 17.73,147.5 17.73,52.5" fill="url(#bg-gradient)" />
    
    <!-- Code Line Pattern Overlay -->
    <rect x="0" y="0" width="200" height="200" fill="url(#code-lines)" />

    <!-- Hexagon Inner Stroke -->
    <polygon points="100,15 173.6,57.5 173.6,142.5 100,185 26.4,142.5 26.4,57.5" fill="none" stroke="#bbaaf2" stroke-width="2" opacity="0.4" />

    <!-- Stack Elements -->
    <g transform="translate(60, 65)">
      <!-- Top Stack -->
      <rect x="10" y="0" width="60" height="12" rx="3" fill="#bbaaf2" opacity="0.9" />
      <line x1="20" y1="6" x2="40" y2="6" stroke="#2c1a4d" stroke-width="3" stroke-linecap="round" />
      
      <!-- Middle Stack -->
      <rect x="0" y="20" width="80" height="12" rx="3" fill="#9d86e9" opacity="0.8" />
      <line x1="15" y1="26" x2="50" y2="26" stroke="#1a0f2e" stroke-width="3" stroke-linecap="round" />
      
      <!-- Bottom Stack -->
      <rect x="20" y="40" width="40" height="12" rx="3" fill="#694bb8" opacity="0.7" />
      <line x1="25" y1="46" x2="35" y2="46" stroke="#1a0f2e" stroke-width="3" stroke-linecap="round" />
    </g>

    <!-- Elixir Drop Element -->
    <path d="M100,115 C115,135 115,155 100,165 C85,155 85,135 100,115 Z" fill="url(#elixir-drop)" opacity="0.9" />
    
    <!-- Highlight on Drop -->
    <path d="M97,125 Q95,145 100,155 Q92,145 97,125 Z" fill="#ffffff" opacity="0.3" />

    <!-- Angle Brackets for Code -->
    <path d="M50,100 L35,115 L50,130" fill="none" stroke="#e0d7fa" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M150,100 L165,115 L150,130" fill="none" stroke="#e0d7fa" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Border Polygon on Top -->
  <polygon points="100,5 182.27,52.5 182.27,147.5 100,195 17.73,147.5 17.73,52.5" fill="none" stroke="#9d86e9" stroke-width="6" />
</svg>